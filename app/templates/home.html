{% extends 'base.html' %}

{% block head %}{% endblock %}

{% block body %}
  {% for post in posts %}
    <article class="media content-section">
      <img class="rounded-circle article-img" src="{{ url_for('static', filename='profile_pic/'+ post.author.picture) }}">
      <div class="media-body">
        <div class="article-metadata">
          <a class="mr-2" href="#">{{ post.author.username }}</a>
          <small class="text-muted">{{ post.date.strftime("%Y %b %d") }}</small>
        </div>
        <h2><a class="article-title" href="#">{{ post.title }}</a></h2>
        <p class="article-content-home">{{ post.content }}</p>
      </div>
    </article>
  {% endfor %}
{% endblock %}
